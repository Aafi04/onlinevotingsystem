name: Cleanup Non-Main Branches and PRs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Close open PRs targeting non-main branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Closing all open PRs whose head branch is not main..."
          gh pr list --state open --json number,headRefName --jq '.[] | select(.headRefName != "main") | .number' | while read pr_number; do
            echo "Closing PR #$pr_number"
            gh pr close "$pr_number" --comment "Closing as part of repository cleanup: removing non-main branches and PRs."
          done

      - name: Delete non-main branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting all remote branches except main..."
          git for-each-ref --format='%(refname:short)' refs/remotes/origin/ | grep -v '^origin/main$' | grep -v '^origin/HEAD$' | sed 's|^origin/||' | while read branch; do
            echo "Deleting branch: $branch"
            git push origin --delete "$branch" || echo "Failed to delete $branch (may already be deleted)"
          done
